<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXORA TRAINING CLUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ff0000;
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo como imagen */
        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 140px;
            width: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo img:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: #ff0000;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 4rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero-title {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 1rem;
            line-height: 1.1;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title .highlight {
            color: #ff0000;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: #cccccc;
            margin-bottom: 3rem;
            letter-spacing: 2px;
            animation: fadeInUp 1s ease-out 0.2s backwards;
        }

        /* Galería de Imágenes - 6 espacios */
        .gallery-section {
            margin-bottom: 4rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .gallery-item {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* Proporción 4:3 */
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff0000;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.5);
            border-color: #cc0000;
        }

        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Placeholder para imágenes */
        .image-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.1), rgba(0, 0, 0, 0.3));
            color: #666666;
        }

        .image-placeholder span {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .image-placeholder p {
            font-size: 1rem;
            color: #999999;
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.95);
            padding: 2rem;
            text-align: center;
            border-top: 2px solid #ff0000;
            margin-top: auto;
        }

        footer p {
            color: #666666;
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .logo img {
                height: 100px;
            }

            .hero-title {
                font-size: 3rem;
            }

            .hero-subtitle {
                font-size: 1.2rem;
            }

            .nav-links {
                gap: 1rem;
                font-size: 1rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                display: none;
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <a href="{% url 'index' %}">
                    <img src="{% static 'imagenes/logo.png' %}" alt="AXORA Training Club">
                </a>
            </div>
            <ul class="nav-links">

        <!-- Galería de Imágenes -->

                    <div class="image-placeholder">

                    </div>
                </div>

                <!-- Imagen 3 -->
                <div class="gallery-item">
                    <!-- <img src="{% static 'imagenes/gym3.jpg' %}" alt="Gimnasio 3"> -->
                    <div class="image-placeholder">
                        <span>📸</span>
                        <p>Imagen 3</p>
                    </div>
                </div>

                <!-- Imagen 4 -->
                <div class="gallery-item">
                    <!-- <img src="{% static 'imagenes/gym4.jpg' %}" alt="Gimnasio 4"> -->
                    <div class="image-placeholder">
                        <span>📸</span>
                        <p>Imagen 4</p>
                    </div>
                </div>

                <!-- Imagen 5 -->
                <div class="gallery-item">
                    <!-- <img src="{% static 'imagenes/gym5.jpg' %}" alt="Gimnasio 5"> -->
                    <div class="image-placeholder">
                        <span>📸</span>
                        <p>Imagen 5</p>
                    </div>
                </div>

                <!-- Imagen 6 -->
                <div class="gallery-item">
                    <!-- <img src="{% static 'imagenes/gym6.jpg' %}" alt="Gimnasio 6"> -->
                    <div class="image-placeholder">
                        <span>📸</span>

            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 AXORA TRAINING CLUB - Todos los derechos reservados</p>
    </footer>
</body>
</html>
