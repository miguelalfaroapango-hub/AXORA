<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXORA TRAINING CLUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ff0000;
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo como imagen */
        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 140px;
            width: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo img:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: #ff0000;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 2rem;
            background: #000000;
        }

        .hero-content {
            max-width: 900px;
        }

        .hero-title {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 1rem;
            line-height: 1.1;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title .highlight {
            color: #ff0000;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: #cccccc;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            animation: fadeInUp 1s ease-out 0.2s backwards;
        }

        .hero-description {
            font-size: 1.1rem;
            color: #999999;
            margin-bottom: 3rem;
            line-height: 1.8;
            animation: fadeInUp 1s ease-out 0.4s backwards;
        }

        .cta-button {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: #ff0000;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out 0.6s backwards;
        }

        .cta-button:hover {
            background: #cc0000;
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.5);
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.95);
            padding: 2rem;
            text-align: center;
            border-top: 2px solid #ff0000;
        }

        footer p {
            color: #666666;
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo img {
                height: 100px;
            }

            .hero-title {
                font-size: 3rem;
            }

            .hero-subtitle {
                font-size: 1.2rem;
            }

            .nav-links {
                gap: 1rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                display: none; /* Ocultar menú en móviles muy pequeños */
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <img src="{% static 'imagenes/logo.png' %}" alt="AXORA Training Club">
            </div>
            <ul class="nav-links">
                <li><a href="#Inicio">Inicio</a></li>
                <li><a href="#Horarios">Horarios</a></li>
                <li><a href="#Contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="inicio">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="highlight">AXORA</span><br>
                TRAINING CLUB
            </h1>
            <p class="hero-subtitle">Transforma tu cuerpo, transforma tu vida</p>
            <p class="hero-description">
                El lugar donde los límites se rompen y los objetivos se conquistan.
            </p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 AXORA TRAINING CLUB - Todos los derechos reservados</p>
    </footer>
</body>
</html>
